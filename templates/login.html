<!DOCTYPE html>
<html>
<head>
<title>SmartStudy AI - Login</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
width:350px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
.container{
display:flex;
align-items:center;
justify-content:center;
gap:80px;
height:100vh;
}

.logo-side img{
width:200px;
}

.logo-img{
width:90px;
margin-bottom:10px;
}

h2{
margin:5px;
color:#333;
}

p{
color:gray;
font-size:14px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#667eea;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#5563d1;
}

a{
text-decoration:none;
color:#667eea;
font-size:14px;
}

</style>
</head>

<body>
<div class="login-box">

<h2>SmartStudy AI</h2>
<p>Your Intelligent Study Companion</p>

<form method="POST" action="/login">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<br>

<a href="/signup">Create new account</a>

</div>

</div>
</body>
</html>
